<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CS Bans{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">CS Bans</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'servers:list' %}">Серверы</a>
                <a class="nav-link" href="{% url 'admins:admins_list' %}">Администраторы</a>
                <a class="nav-link" href="{% url 'admins:groups_list' %}">Группы</a>
                <a class="nav-link" href="{% url 'admins:permissions_list' %}">Права</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
