<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BeautyBans{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            font-size: 14px;
        }
        .navbar-brand {
            font-size: 1.3rem;
            font-weight: bold;
        }
        .nav-link {
            font-size: 0.95rem;
            padding: 0.4rem 1rem !important;
        }
        .btn {
            font-size: 0.9rem;
            padding: 0.4rem 0.9rem;
        }
        .btn-sm {
            font-size: 0.85rem;
            padding: 0.3rem 0.7rem;
        }
        .form-label {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.3rem;
        }
        .form-control, .form-select {
            font-size: 0.9rem;
            padding: 0.4rem 0.6rem;
        }
        textarea.form-control {
            min-height: 80px;
        }
        .table {
            font-size: 0.85rem;
            width: 95% !important;
            margin: 0 auto;
        }
        .table-responsive {
            overflow-x: auto;
        }
        .action-icon {
            font-size: 0.9rem;
            cursor: pointer;
            margin: 0 0.1rem;
            text-decoration: none;
        }
        .action-icon:hover {
            opacity: 0.7;
        }
        .card {
            border-radius: 0.4rem;
            max-width: 1200px;
            margin: 0 auto 1rem auto;
        }
        .card-body {
            padding: 1rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            text-align: center;
        }
        h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .nav-tabs .nav-link {
            font-size: 0.95rem;
            padding: 0.5rem 1rem;
        }
        .badge {
            font-size: 0.8rem;
        }
        .content-wrapper {
            max-width: 95%;
            margin: 0 auto;
        }
        .punishment-details {
            background-color: #f8f9fa;
            padding: 0.8rem;
            font-size: 0.85rem;
        }
        .clickable-row {
            cursor: pointer;
        }
        .clickable-row:hover {
            background-color: #f8f9fa;
        }
        .collapsing {
            transition: none !important;
        }
        .collapse {
            transition: none !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand ms-3" href="/">BeautyBans</a>
            <div class="navbar-nav ms-auto me-3">
                {% if user.is_authenticated %}
                <a class="nav-link {% if request.resolver_match.app_name == 'servers' %}active{% endif %}" href="{% url 'servers:list' %}">Серверы</a>
                <a class="nav-link {% if request.resolver_match.app_name == 'admins' %}active{% endif %}" href="{% url 'admins:admin_panel' %}">Администрация</a>
                <a class="nav-link {% if request.resolver_match.app_name == 'punishments' %}active{% endif %}" href="{% url 'punishments:list' %}">Наказания</a>
                <a class="nav-link" href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i> Выход
                </a>
                {% else %}
                <a class="nav-link {% if request.resolver_match.url_name == 'public_bans' %}active{% endif %}" href="{% url 'public_bans' %}">Наказания</a>
                <a class="nav-link {% if request.resolver_match.url_name == 'public_admins' %}active{% endif %}" href="{% url 'public_admins' %}">Администрация</a>
                <a class="nav-link" href="{% url 'login' %}">
                    <i class="bi bi-box-arrow-in-right"></i> Вход
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="content-wrapper mt-3 px-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
