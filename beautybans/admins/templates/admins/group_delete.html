{% extends 'base.html' %}

{% block title %}Удалить группу - CS Bans{% endblock %}

{% block content %}
<h1>Удаление группы</h1>

<div class="card mt-4">
    <div class="card-body">
        <div class="alert alert-warning">
            <h5>Вы уверены, что хотите удалить группу?</h5>
            <p class="mb-0"><strong>{{ group.name }}</strong></p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'admins:groups_list' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
