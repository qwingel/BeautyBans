{% extends 'base.html' %}

{% block title %}Удалить права - BeautyBans{% endblock %}

{% block content %}
<h1>Удаление прав доступа</h1>

<div class="card mt-4">
    <div class="card-body">
        <div class="alert alert-warning">
            <h5>Вы уверены, что хотите удалить права доступа?</h5>
            <p class="mb-0">
                <strong>{{ permission.admin.name }}</strong> на сервере <strong>{{ permission.server.name }}</strong>
            </p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'admins:admin_panel' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
